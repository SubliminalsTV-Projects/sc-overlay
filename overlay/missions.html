<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>SC Blueprint Tracker</title>
<script>/* AMD compatibility: apply the lite skin BEFORE first paint (no flash) when the shell asks for it. */
  if (new URLSearchParams(location.search).has("lite")) document.documentElement.classList.add("amd-lite");</script>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
<style>
  /* Mission Control stream-overlay design language (SC diegetic HUD):
     navy-teal translucent glass, cyan system chrome, gold value accents,
     cyan diamond glyph, scanlines + visor sheen,
     Inter (uppercase) labels + monospace numbers, subtle helmet-projection tilt. */
  :root {
    --cyan: #45D0E0; --cyan-bright: #7fe3ef; --cyan-text: #c4dbe6; --cyan-dim: #7fa7bb; --faint: #5d7e90;
    --gold: #FFD27A; --amber: #F5A623; --green: #2ee6a0; --red: #ff8478;
    --border: rgba(92, 198, 224, 0.38); --divider: rgba(92, 198, 224, 0.16); --track: #0c1a26;
    --sans: "Inter", system-ui, sans-serif;
    --mono: ui-monospace, "Cascadia Code", "Cascadia Mono", Consolas, "SF Mono", monospace;
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; background: transparent; }
  body { font-family: var(--sans); color: var(--cyan-text); }

  /* Thin, themed scrollbars (the default chrome is jarring on the HUD). */
  ::-webkit-scrollbar { width: 6px; height: 6px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: rgba(92, 198, 224, 0.28); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: rgba(92, 198, 224, 0.5); }
  * { scrollbar-width: thin; scrollbar-color: rgba(92, 198, 224, 0.28) transparent; }

  #panel {
    position: relative; width: 380px; margin: 16px; border-radius: 12px;
    background: linear-gradient(180deg, rgba(13, 27, 40, 0.72), rgba(8, 17, 26, 0.8));
    border: 1px solid var(--border);
    box-shadow: inset 0 0 0 1px rgba(92, 198, 224, 0.08), 0 8px 34px rgba(0, 0, 0, 0.45), 0 0 30px rgba(69, 208, 224, 0.16);
    -webkit-backdrop-filter: blur(3px); backdrop-filter: blur(3px);
    /* Subtle helmet-projection tilt (matches the stream overlays). Y-axis ONLY: rotateX
       tilts around the horizontal axis, so with perspective the horizontal scale varies
       down the panel — a tall pool projected wider at the bottom, overflowing the
       viewport into a horizontal scrollbar. rotateY displaces X by X (never by Y), so
       the horizontal extent stays constant however tall the content grows. */
    transform: perspective(1700px) rotateY(4deg);
    transform-origin: 60% center;
  }
  /* CRT scanlines */
  #panel::before { content: ""; position: absolute; inset: 0; border-radius: 12px; pointer-events: none; z-index: 3;
    background: repeating-linear-gradient(0deg, rgba(150, 225, 245, 0.06) 0 1px, transparent 1px 3px); mix-blend-mode: screen; }
  /* visor sheen */
  #panel::after { content: ""; position: absolute; inset: 0; border-radius: 12px; pointer-events: none; z-index: 3;
    background: linear-gradient(180deg, rgba(180, 235, 250, 0.09), transparent 36%); }
  #panel.empty .pool, #panel.empty .catbar, #panel.empty .head .progress { display: none; }

  /* AMD compatibility "lite" skin (added on <html> via ?lite): strip everything that forces
     continuous GPU recompositing over the game's Vulkan surface — backdrop blur, the blend-mode
     scanlines/sheen, the 3D helmet tilt, and all animations. These cross-surface composite ops
     are the transparent-overlay-on-AMD device-lost/TDR trigger. Panel bg goes near-opaque so
     text stays legible without the blur. */
  html.amd-lite #panel { -webkit-backdrop-filter: none !important; backdrop-filter: none !important;
    background: rgba(8, 17, 26, 0.95) !important; transform: none !important; }
  html.amd-lite #panel::before, html.amd-lite #panel::after { display: none !important; }
  html.amd-lite #moveBanner { -webkit-backdrop-filter: none !important; backdrop-filter: none !important; }
  html.amd-lite *, html.amd-lite *::before, html.amd-lite *::after { animation: none !important; transition: none !important; }

  /* Move/reposition mode: whole panel becomes a drag surface with a banner. */
  #moveBanner { display: none; position: absolute; inset: 0; z-index: 50; -webkit-app-region: drag; cursor: move;
    background: rgba(69, 208, 224, 0.12); -webkit-backdrop-filter: blur(1px); backdrop-filter: blur(1px); }
  #panel.moving #moveBanner { display: flex; align-items: center; justify-content: center; }
  .movebox { display: flex; align-items: center; gap: 12px; padding: 10px 16px; border-radius: 4px;
    border: 1px solid var(--cyan); background: rgba(8, 17, 26, 0.92); color: var(--cyan-text);
    font-size: 12px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase; }
  #moveDone { -webkit-app-region: no-drag; cursor: pointer; font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.06em; text-transform: uppercase; padding: 4px 12px; border-radius: 3px;
    border: 1px solid var(--cyan); background: rgba(69, 208, 224, 0.15); color: var(--cyan); }
  #moveDone:hover { background: rgba(69, 208, 224, 0.3); }

  /* Grab handle: a discoverable "move" affordance that fades in on hover (Electron
     only). Clicking it drops into move mode — the reliable, hover-suspended drag. */
  #grip { display: none; position: absolute; top: 8px; right: 44px; z-index: 20;
    width: 25px; height: 25px; place-items: center; -webkit-app-region: no-drag;
    cursor: grab; user-select: none; border: 1px solid var(--border); border-radius: 4px;
    background: rgba(8, 17, 26, 0.72); color: var(--cyan); opacity: 0; transition: opacity 0.15s ease; }
  #grip svg { width: 14px; height: 14px; display: block; }
  #panel.electron #grip { display: grid; opacity: 0.85; }
  #grip:hover { opacity: 1 !important; background: rgba(69, 208, 224, 0.2); }
  #panel.moving #grip { display: none; }

  /* Settings cog (top-right) — hover-revealed like the grip, so the resting overlay stays
     clean. Opens the declutter menu (hide odds / verify / category bar) + OCR status. */
  #cog { position: absolute; top: 8px; right: 11px; z-index: 22; -webkit-app-region: no-drag;
    width: 25px; height: 25px; display: grid; place-items: center; cursor: pointer;
    border: 1px solid var(--border); border-radius: 4px; background: rgba(8, 17, 26, 0.72);
    color: var(--cyan); font-size: 14px; line-height: 1; opacity: 0.85; transition: opacity 0.15s ease; }
  #cog.open { opacity: 1; }
  #cog:hover { opacity: 1; background: rgba(69, 208, 224, 0.2); }
  #panel.moving #cog { display: none; }
  #cogMenu { display: none; position: absolute; top: 37px; right: 11px; z-index: 31; width: 232px;
    -webkit-app-region: no-drag; background: #0a1822; border: 1px solid var(--border); border-radius: 4px;
    box-shadow: 0 14px 36px rgba(0, 0, 0, 0.6); padding: 6px 0 8px; }
  #cogMenu.open { display: block; }
  #cogMenu .cog-sec { font-family: var(--sans); font-size: 8.5px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--cyan-dim); padding: 8px 12px 4px; }
  #cogMenu .cog-opt { display: flex; align-items: center; gap: 9px; padding: 6px 12px; cursor: pointer;
    font-family: var(--sans); font-size: 12px; color: var(--cyan-text); }
  #cogMenu .cog-opt:hover { background: rgba(69, 208, 224, 0.12); }
  #cogMenu .cog-opt input { width: 15px; height: 15px; accent-color: var(--cyan); cursor: pointer; }
  #cogMenu .cog-ocr { padding: 2px 12px 4px; font-size: 10.5px; line-height: 1.55; color: var(--cyan-dim); }
  #cogMenu .cog-ocr b { color: var(--cyan-text); font-weight: 600; }
  #cogMenu .cog-ocr .ocr-dot { display: inline-block; width: 7px; height: 7px; border-radius: 50%;
    margin-right: 6px; vertical-align: middle; background: var(--faint); }
  #cogMenu .cog-ocr.on .ocr-dot { background: var(--cyan-bright); box-shadow: 0 0 6px var(--cyan); }

  /* Cog declutter toggles: hide footer odds/verify buttons + the category filter bar. */
  #panel.hide-catbar .catbar { display: none; }
  /* Cog action button (Verify) + inline status line. */
  #cogMenu .cog-btn { display: block; width: calc(100% - 24px); margin: 5px 12px 2px; padding: 7px 10px;
    text-align: center; font-family: var(--sans); font-size: 11.5px; font-weight: 600; letter-spacing: 0.06em;
    cursor: pointer; color: var(--cyan-text); background: rgba(69, 208, 224, 0.1);
    border: 1px solid var(--border); border-radius: 4px; }
  #cogMenu .cog-btn:hover { background: rgba(69, 208, 224, 0.2); border-color: var(--cyan); }
  #cogMenu .cog-btn:disabled { opacity: 0.6; cursor: default; }
  #cogMenu .cog-status { padding: 1px 12px 3px; font-size: 10px; color: var(--cyan-dim); min-height: 12px; }

  /* Transient OCR activity toast (item captured / mission read). Never blocks clicks. */
  #ocrToast { position: absolute; left: 50%; bottom: 46px; transform: translateX(-50%) translateY(6px);
    z-index: 40; pointer-events: none; max-width: 86%; box-sizing: border-box;
    display: flex; align-items: center; gap: 8px; padding: 7px 13px;
    background: rgba(10, 24, 34, 0.94); border: 1px solid var(--cyan); border-radius: 20px;
    font-family: var(--sans); font-size: 11.5px; color: var(--cyan-text);
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    box-shadow: 0 6px 22px rgba(0, 0, 0, 0.5), 0 0 16px rgba(69, 208, 224, 0.18) inset;
    opacity: 0; transition: opacity 0.25s ease, transform 0.25s ease; }
  #ocrToast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  .head { position: relative; padding: 15px 17px 13px; z-index: 10;
    /* tick-strip data-texture divider under the header */
    border-bottom: 1px solid var(--divider);
    /* drag handle for the Electron overlay (move by header while hovering) */
    -webkit-app-region: drag; cursor: grab; }
  .head::after { content: ""; position: absolute; left: 17px; right: 17px; bottom: -1px; height: 2px;
    background: repeating-linear-gradient(90deg, rgba(92, 198, 224, 0.32) 0 3px, transparent 3px 8px); opacity: 0.7; }
  #missionPick, .progress { -webkit-app-region: no-drag; }

  .eyebrow { position: relative; display: flex; align-items: center; gap: 9px; font-size: 10px; font-weight: 600;
    letter-spacing: 0.22em; text-transform: uppercase; color: var(--cyan); }
  /* diamond glyph */
  .dot { position: relative; width: 7px; height: 7px; background: var(--cyan-bright); transform: rotate(45deg);
    box-shadow: 0 0 8px var(--cyan); animation: pulse 1.9s ease-in-out infinite;
    transition: background 0.2s ease, box-shadow 0.2s ease; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }
  /* In the fabricator: diamond glows gold (matches the collected count). SubliminalsTV live: purple. */
  .dot.fab { background: var(--gold); box-shadow: 0 0 11px var(--gold), 0 0 4px var(--gold); }
  .dot.live { background: #9146FF; box-shadow: 0 0 11px #9146FF, 0 0 4px #9146FF; }
  .dot.clickable { cursor: pointer; -webkit-app-region: no-drag; }
  .dot.clickable::after { content: ""; position: absolute; inset: -8px; } /* bigger click target */
  /* Live-on-Twitch hover invite */
  #liveTip { display: none; position: absolute; top: calc(100% + 8px); left: -2px; z-index: 45;
    white-space: nowrap; background: rgba(10, 24, 34, 0.97); border: 1px solid #9146FF; border-radius: 8px;
    padding: 7px 12px; font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: 0.02em;
    text-transform: none; color: var(--cyan-text); box-shadow: 0 6px 20px rgba(0,0,0,0.5); pointer-events: none; }
  #liveTip b { color: #b98bff; }
  #liveTip.show { display: block; }

  /* Title + owned count share one row so the count sits beside the mission name
     instead of pinned top-right under the cog/grip buttons. */
  .titlerow { display: flex; align-items: baseline; justify-content: space-between; gap: 12px; margin-top: 9px; }
  .title { flex: 1; min-width: 0; font-size: 19px; font-weight: 600; line-height: 1.12; letter-spacing: 0.02em;
    text-transform: uppercase; color: #eaf6fb; text-shadow: 0 0 14px rgba(69, 208, 224, 0.35); }
  .sub { margin-top: 4px; font-size: 10px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--cyan-dim); }

  #missionPick { display: none; position: relative; margin-top: 11px; }
  #missionBtn { width: 100%; display: flex; align-items: center; gap: 8px; cursor: pointer;
    font-family: var(--sans); font-size: 12.5px; font-weight: 500; text-align: left;
    background: rgba(69, 208, 224, 0.08); color: var(--cyan-text);
    border: 1px solid var(--border); border-radius: 3px; padding: 7px 10px; }
  #missionBtn:hover { background: rgba(69, 208, 224, 0.16); border-color: var(--cyan); }
  #missionBtnLabel { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  #missionBtn .caret { color: var(--cyan); font-size: 12px; }
  #missionMenu { display: none; position: absolute; left: 0; right: 0; top: calc(100% + 4px); z-index: 30;
    background: #0a1822; border: 1px solid var(--border); border-radius: 3px;
    max-height: 240px; overflow-y: auto; box-shadow: 0 14px 36px rgba(0, 0, 0, 0.6); }
  #missionMenu.open { display: block; }
  #missionMenu .opt { padding: 8px 11px; font-size: 12.5px; cursor: pointer; color: var(--cyan-text);
    border-bottom: 1px solid var(--divider); }
  #missionMenu .opt:last-child { border-bottom: none; }
  #missionMenu .opt:hover { background: rgba(69, 208, 224, 0.14); }
  #missionMenu .opt.active { color: var(--cyan-bright); font-weight: 600; }

  .progress { flex: none; text-align: right; align-self: center; }
  .progress .frac { font-family: var(--mono); font-weight: 500; font-size: 18px; color: var(--gold);
    font-variant-numeric: tabular-nums; text-shadow: 0 0 12px rgba(255, 210, 122, 0.35); }
  .progress .lbl { font-size: 9px; letter-spacing: 0.18em; text-transform: uppercase; color: var(--faint); }
  .completed { margin-top: 8px; display: inline-block; font-size: 10px; font-weight: 600; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--green); border: 1px solid rgba(46, 230, 160, 0.45);
    background: rgba(46, 230, 160, 0.1); padding: 2px 9px; border-radius: 3px; }

  /* Mission-complete summary card — shown briefly over the completed mission. */
  .cc { margin-top: 10px; border: 1px solid rgba(255, 210, 122, 0.5); border-radius: 5px;
    background: linear-gradient(180deg, rgba(255, 210, 122, 0.14), rgba(46, 230, 160, 0.06));
    padding: 9px 11px 10px; box-shadow: 0 0 18px rgba(255, 210, 122, 0.14) inset;
    animation: ccIn 0.35s ease both; }
  @keyframes ccIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
  .cc-head { display: flex; align-items: center; gap: 7px; font-size: 11px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); }
  .cc-check { display: inline-flex; align-items: center; justify-content: center; width: 15px; height: 15px;
    border-radius: 50%; background: var(--green); color: #062018; font-size: 10px; font-weight: 800; }
  /* Abandoned variant: amber/red, no stats — just explains why the pool vanished. */
  .cc.abn { border-color: rgba(255, 132, 120, 0.5);
    background: linear-gradient(180deg, rgba(255, 132, 120, 0.12), rgba(255, 132, 120, 0.04));
    box-shadow: 0 0 18px rgba(255, 132, 120, 0.12) inset; }
  .cc.abn .cc-head { color: var(--amber); }
  .cc-check.abn { background: var(--red); color: #200a08; }
  .cc-stats { display: flex; gap: 16px; margin-top: 8px; }
  .cc-stat { display: flex; flex-direction: column; line-height: 1.05; }
  .cc-val { font-family: "JetBrains Mono", ui-monospace, monospace; font-size: 18px; font-weight: 700; color: var(--gold); }
  .cc-lbl { font-size: 8.5px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--cyan-dim); margin-top: 2px; }
  /* Unlocked-blueprint reveal: the actual item render + name for each drop.
     Column count = min(drops, 4); tiles fill their cell, so fewer drops = bigger
     images. A single drop gets the full-width hero treatment (.single). */
  .cc-bps { display: grid; grid-template-columns: repeat(var(--cols, 4), 1fr); gap: 8px; margin-top: 9px; }
  .cc-bps.single { grid-template-columns: 1fr; }
  .cc-bp { display: flex; flex-direction: column; align-items: center; min-width: 0; }
  .cc-bp-thumb { position: relative; width: 100%; aspect-ratio: 1; border-radius: 4px;
    background: radial-gradient(circle at 50% 38%, rgba(69, 208, 224, 0.14), rgba(8, 17, 26, 0.55));
    border: 1px solid rgba(69, 208, 224, 0.28); overflow: hidden;
    display: flex; align-items: center; justify-content: center; }
  .cc-bp-thumb img { width: 100%; height: 100%; object-fit: contain; }
  .cc-bp-thumb.noimg::before { content: "◆"; color: var(--cyan-dim); font-size: 15px; }
  .cc-bp-name { margin-top: 4px; width: 100%; text-align: center; font-size: 9px; line-height: 1.15;
    letter-spacing: 0.02em; color: var(--cyan-text); overflow: hidden; text-overflow: ellipsis;
    display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .cc-bps.single .cc-bp-name { font-size: 12px; margin-top: 7px; -webkit-line-clamp: 1; }

  .pool { padding: 9px 11px 11px; position: relative; z-index: 2; }
  .row { display: flex; align-items: center; gap: 10px; padding: 7px 9px; margin-top: 3px; border-radius: 3px;
    background: rgba(255, 255, 255, 0.02); cursor: pointer; user-select: none; transition: background .15s; }
  .row:hover { background: rgba(69, 208, 224, 0.07); }
  .row.owned { background: linear-gradient(90deg, rgba(69, 208, 224, 0.12), rgba(69, 208, 224, 0.02)); }
  .mark { flex: none; width: 17px; height: 17px; display: grid; place-items: center; border-radius: 2px;
    border: 1px solid var(--border); color: var(--cyan-bright); font-size: 12px; font-weight: 700; background: var(--track); }
  .row.owned .mark { border-color: var(--cyan); background: rgba(69, 208, 224, 0.22); }
  .name { flex: 1; font-size: 13.5px; font-weight: 500; color: var(--cyan-dim); }
  .row.owned .name { color: #eaf6fb; }
  .name .ovr { font-size: 9px; color: var(--gold); margin-left: 6px; letter-spacing: 0.1em; text-transform: uppercase; }
  .name .ovr.def { color: var(--cyan-dim); }
  .chance { flex: none; font-family: var(--mono); font-weight: 500; font-size: 11px; color: var(--cyan-dim); font-variant-numeric: tabular-nums; }

  /* Fabricator-style category filter bar (mirrors the in-game item fabricator
     filter). 10 top-level tabs; tabs absent from the current pool are greyed. */
  .catbar { display: flex; gap: 4px; padding: 9px 11px 3px; flex-wrap: wrap; position: relative; z-index: 2; }
  .cat { position: relative; width: 30px; height: 30px; border-radius: 4px; cursor: pointer;
    border: 1px solid var(--divider); background: rgba(69, 208, 224, 0.05); display: grid; place-items: center;
    transition: background .12s, border-color .12s; }
  .cat .ci { width: 18px; height: 18px; background: var(--cyan-dim);
    -webkit-mask: var(--u) center / contain no-repeat; mask: var(--u) center / contain no-repeat; transition: background .12s; }
  .cat:hover { border-color: var(--cyan); background: rgba(69, 208, 224, 0.14); }
  .cat:hover .ci { background: var(--cyan-bright); }
  .cat.active { border-color: var(--cyan); background: rgba(69, 208, 224, 0.24);
    box-shadow: 0 0 10px rgba(69, 208, 224, 0.28) inset; }
  .cat.active .ci { background: var(--cyan-bright); }
  .cat.off { cursor: default; opacity: 0.3; }
  .cat.off:hover { border-color: var(--divider); background: rgba(69, 208, 224, 0.05); }
  .cat.off .ci { background: var(--faint); }
  .cat .cnt { position: absolute; top: -5px; right: -5px; min-width: 14px; height: 14px; padding: 0 3px;
    border-radius: 7px; background: var(--cyan); color: #04141b; font-family: var(--mono); font-size: 8.5px;
    font-weight: 700; line-height: 14px; text-align: center; }
  .cat.off .cnt { display: none; }

  /* Dynamic-event reward ladder (Return of XenoThreat) shown on a pool-less event
     mission: an event header, a "check your journal" note, and per-tier reward rows. */
  .evhead { display: flex; align-items: center; gap: 8px; margin: 2px 3px 7px; font-size: 12px; font-weight: 700;
    letter-spacing: 0.08em; text-transform: uppercase; color: var(--gold); text-shadow: 0 0 12px rgba(255, 210, 122, 0.3); }
  .evhead .dot { background: var(--gold); box-shadow: 0 0 8px var(--gold); }
  .evnote { margin: 0 3px 8px; padding: 7px 9px; font-size: 10.5px; line-height: 1.4; color: var(--cyan-text);
    background: rgba(69, 208, 224, 0.06); border: 1px solid var(--divider); border-radius: 4px; }
  .evtier { display: flex; align-items: center; gap: 9px; margin: 11px 3px 4px; cursor: pointer;
    user-select: none; padding: 2px 3px; border-radius: 3px; transition: background .12s; }
  .evtier:hover { background: rgba(69, 208, 224, 0.07); }
  .evtier .evcar { color: var(--cyan); font-size: 9px; }
  .evtier .evpct { font-family: var(--mono); font-weight: 700; font-size: 13px; color: var(--gold);
    font-variant-numeric: tabular-nums; }
  .evtier .evbar { flex: 1; height: 1px; background: var(--divider); }
  .evtier .evcount { font-family: var(--mono); font-size: 10px; color: var(--faint); }
  .evtier.done .evcount { color: var(--green); }

  .msg { padding: 28px 18px; text-align: center; color: var(--cyan-dim); font-size: 13px; position: relative; z-index: 2; }
  .msg b { color: var(--cyan); display: block; font-weight: 600; font-size: 13px; text-transform: uppercase;
    letter-spacing: 0.1em; margin-bottom: 5px; }

  /* Footer: big two-line Collected on the left; app + game version stacked small on the right. */
  .foot-col-collected { display: flex; flex-direction: column; line-height: 1; }
  .fc-label { font-family: var(--sans); font-size: 9px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--cyan-dim); }
  .fc-num { font-family: var(--mono); font-size: 23px; font-weight: 700; color: var(--gold);
    margin-top: 4px; text-shadow: 0 0 12px rgba(255, 210, 122, 0.3); }
  .foot-col-ver { display: flex; flex-direction: column; align-items: flex-end; text-align: right;
    line-height: 1.4; }
  .fv-app { font-family: var(--sans); font-size: 9px; font-weight: 600; letter-spacing: 0.06em;
    text-transform: uppercase; color: var(--cyan-dim); }
  .fv-game { font-family: var(--mono); font-size: 9.5px; color: var(--faint); }
  .foot { padding: 10px 16px 11px; position: relative; z-index: 2; border-top: 1px solid var(--divider);
    display: flex; align-items: flex-end; justify-content: space-between; gap: 12px; }

  /* Mission rewards readout (schema/2): static aUEC payout + ITEM rewards (actual
     items — Wikelo ships, armor, scrip — not blueprints). Items render with the same
     divider + row/tick-box treatment as the pool, but their tick is manual-only. */
  .rew { margin: 0 0 4px; }
  .rewpay { display: flex; align-items: baseline; gap: 10px; padding: 7px 9px; margin-top: 3px;
    border: 1px solid rgba(255, 210, 122, 0.35); border-radius: 3px; background: rgba(255, 210, 122, 0.07); }
  .rewpay .rp-lbl { font-size: 9px; font-weight: 700; letter-spacing: 0.16em; text-transform: uppercase; color: var(--gold); }
  .rewpay .rp-val { font-family: var(--mono); font-size: 14px; font-weight: 600; color: var(--gold);
    font-variant-numeric: tabular-nums; text-shadow: 0 0 10px rgba(255, 210, 122, 0.3); }
  .poolhead { display: flex; align-items: baseline; gap: 8px; margin: 11px 3px 3px; padding-top: 9px;
    border-top: 1px solid var(--divider); font-size: 9.5px; font-weight: 700; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--cyan); }
  .poolhead .ph-sub { font-size: 8.5px; font-weight: 500; letter-spacing: 0.06em; text-transform: none;
    color: var(--cyan-dim); }
  .ambig { margin: 8px 3px 2px; padding: 6px 9px; border-radius: 3px; font-size: 10px; line-height: 1.35;
    color: var(--gold); border: 1px solid rgba(255, 210, 122, 0.35); background: rgba(255, 210, 122, 0.08); }
  .rewnote { margin-top: 7px; padding: 0 3px; font-size: 10.5px; color: var(--faint); }

  /* Idle recent-activity: last completed missions + received blueprints (with times). */
  .recent { display: flex; flex-direction: column; gap: 11px; padding: 2px 1px; position: relative; z-index: 2; }
  .ra-h { font-family: var(--sans); font-size: 9px; font-weight: 700; letter-spacing: 0.18em;
    text-transform: uppercase; color: var(--cyan-dim); margin: 0 0 5px; padding-bottom: 3px;
    border-bottom: 1px solid var(--border); }
  .ra-list { list-style: none; margin: 0; padding: 0; }
  .ra-list li { display: flex; align-items: center; gap: 7px; padding: 3px 0; font-size: 12px; }
  .ra-glyph { flex: none; color: var(--cyan); font-size: 8px; transform: translateY(-1px); }
  .ra-name { flex: 1 1 auto; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; color: var(--cyan-text); }
  .ra-val { flex: none; font-family: var(--mono); font-size: 11px; font-weight: 500; color: var(--gold); }
  .ra-when { flex: none; display: flex; flex-direction: column; align-items: flex-end; line-height: 1.15; }
  .ra-date { font-family: var(--mono); font-size: 10px; color: var(--cyan-dim); }
  .ra-rel { font-size: 8px; letter-spacing: 0.04em; color: var(--faint); }

  /* "What's new" card — shown once per new version at the top of the HUD. Hover-
     interactive (like the panel) + flagged as a modal so it's closeable even under lock. */
  #whatsnew { display: none; margin: 0 0 11px; border: 1px solid var(--cyan); border-radius: 8px;
    background: linear-gradient(180deg, rgba(69, 208, 224, 0.13), rgba(8, 17, 26, 0.55));
    box-shadow: 0 0 22px rgba(69, 208, 224, 0.14) inset; padding: 11px 12px 12px; position: relative; z-index: 6; }
  #whatsnew.show { display: block; }
  #whatsnew .wn-head { display: flex; align-items: center; gap: 8px; }
  #whatsnew .wn-title { flex: 1; font-family: var(--sans); font-size: 11px; font-weight: 700;
    letter-spacing: 0.16em; text-transform: uppercase; color: var(--cyan); }
  #whatsnew .wn-ver { font-family: var(--mono); font-size: 11px; color: var(--gold); }
  #whatsnew .wn-x { flex: none; width: 21px; height: 21px; display: grid; place-items: center; cursor: pointer;
    border: 1px solid var(--divider); border-radius: 4px; color: var(--cyan-dim); font-size: 12px; background: rgba(69, 208, 224, 0.06); }
  #whatsnew .wn-x:hover { color: var(--cyan); border-color: var(--cyan); background: rgba(69, 208, 224, 0.16); }
  #whatsnew ul { list-style: none; margin: 9px 0 0; padding: 0; }
  #whatsnew li { display: flex; gap: 8px; padding: 4px 0; font-size: 12px; line-height: 1.4; color: var(--cyan-text); }
  #whatsnew li::before { content: "◆"; color: var(--cyan); font-size: 7px; flex: none; transform: translateY(4px); }
  #whatsnew .wn-foot { display: flex; align-items: center; gap: 10px; margin-top: 11px; padding-top: 10px; border-top: 1px solid var(--border); }
  #whatsnew .wn-dismiss { display: flex; align-items: center; gap: 7px; font-size: 11px; color: var(--cyan-dim); cursor: pointer; user-select: none; }
  #whatsnew .wn-dismiss input { width: 15px; height: 15px; accent-color: var(--cyan); }
  #whatsnew .wn-close { margin-left: auto; font-family: var(--sans); font-size: 11px; font-weight: 600; letter-spacing: 0.04em;
    padding: 6px 15px; cursor: pointer; border: 1px solid var(--cyan); border-radius: 5px; color: #06121a; background: var(--cyan); }
  #whatsnew .wn-close:hover { background: var(--cyan-bright); }

  /* Collapsible "Mission Info" drawer: faction/giver, mission type, reputation.
     Collapsed by default on a pooled mission (tap the header to expand); forced open
     when the mission has no blueprint pool so there's still something on screen. */
  .mi { margin: 0 0 7px; }
  .mi-head { display: flex; align-items: center; gap: 8px; padding: 6px 9px; cursor: pointer;
    font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--cyan-dim);
    border: 1px solid var(--divider); border-radius: 3px; background: rgba(69, 208, 224, 0.04);
    user-select: none; transition: background .12s, border-color .12s; }
  .mi-head:hover { background: rgba(69, 208, 224, 0.1); border-color: var(--cyan); color: var(--cyan-text); }
  .mi-head.static { cursor: default; }
  .mi-head.static:hover { background: rgba(69, 208, 224, 0.04); border-color: var(--divider); color: var(--cyan-dim); }
  .mi-head .car { color: var(--cyan); font-size: 9px; }
  .mi-body { padding: 8px 9px 4px; }
  .mi-row { display: flex; align-items: baseline; gap: 10px; padding: 3px 0; }
  .mi-row .mi-k { min-width: 72px; font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--cyan-dim); }
  .mi-row .mi-v { flex: 1; font-size: 13px; color: var(--cyan-text); text-align: right; }
  /* "inferred" qualifier on the rank readout — it's a lower bound, not exact rep. */
  .mi-row .mi-hint { font-size: 8.5px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--cyan-dim); }
  .mi-sec { margin: 8px 0 2px; font-size: 9px; font-weight: 700; letter-spacing: 0.14em;
    text-transform: uppercase; color: var(--cyan-dim); }
  .mi-rep { display: flex; align-items: baseline; gap: 10px; padding: 3px 0; }
  .mi-rep .mi-fac { flex: 1; font-size: 12.5px; color: var(--cyan-text); }
  .mi-rep .mi-amt { font-family: var(--mono); font-size: 11px; font-variant-numeric: tabular-nums; }
  .mi-rep .mi-amt.pos { color: var(--gold); }
  .mi-rep .mi-amt.neg { color: var(--red); }

  /* Reputation progress bar — "how close am I to ranking up" for the tracked giver.
     A lower-bound estimate (max of the inferred-rank floor + witnessed post-4.8 gains). */
  .rb { padding: 4px 0 2px; }
  .rb-track { position: relative; height: 7px; margin: 6px 0 4px; border-radius: 4px;
    background: rgba(90, 180, 210, 0.14); box-shadow: inset 0 0 0 1px rgba(120, 210, 235, 0.18); overflow: hidden; }
  .rb-fill { height: 100%; border-radius: 4px; transition: width 0.35s ease;
    background: linear-gradient(90deg, var(--cyan-text), var(--gold)); box-shadow: 0 0 6px rgba(255, 210, 122, 0.35); }
  /* Floor-anchored state: we know the rank but haven't summed gains within it. */
  .rb.floor .rb-fill { background: repeating-linear-gradient(90deg,
    rgba(120, 210, 235, 0.55) 0 4px, rgba(120, 210, 235, 0.15) 4px 8px); box-shadow: none; }
  .rb-cap { font-family: var(--mono); font-size: 10px; letter-spacing: 0.02em;
    color: var(--cyan-text); opacity: 0.85; font-variant-numeric: tabular-nums; }
  .rb-cap .nx { color: var(--gold); }

  /* Collapsed "Collected" group: owned blueprints tuck under this toggle so the
     list leads with what you can still GET. Click to expand/collapse. */
  .grphead { display: flex; align-items: center; gap: 8px; margin-top: 9px; padding: 6px 9px; cursor: pointer;
    font-size: 10px; font-weight: 600; letter-spacing: 0.14em; text-transform: uppercase; color: var(--cyan-dim);
    border: 1px solid var(--divider); border-radius: 3px; background: rgba(69, 208, 224, 0.04);
    user-select: none; transition: background .12s, border-color .12s; }
  .grphead:hover { background: rgba(69, 208, 224, 0.1); border-color: var(--cyan); color: var(--cyan-text); }
  .grphead .car { color: var(--cyan); font-size: 9px; }
  .grphead .gcnt { margin-left: auto; font-family: var(--mono); font-size: 10px; color: var(--gold);
    font-variant-numeric: tabular-nums; }

  /* Confirm-before-removing (prevents an accidental click un-owning a blueprint). */
  .row.confirming { background: rgba(255, 132, 120, 0.1); }
  .row .confirm { display: flex; align-items: center; gap: 6px; margin-left: auto; }
  .confirm .cf-q { font-size: 10.5px; color: var(--amber); white-space: nowrap; text-transform: uppercase; letter-spacing: 0.06em; }
  .confirm button { font-family: var(--sans); font-size: 10.5px; font-weight: 600; cursor: pointer;
    padding: 3px 10px; border-radius: 3px; border: 1px solid var(--border); background: rgba(69, 208, 224, 0.08); color: var(--cyan-text); }
  .confirm .cf-yes { border-color: var(--red); color: var(--red); background: rgba(255, 132, 120, 0.12); }
</style>
</head>
<body>
  <div id="panel" class="empty">
    <div id="moveBanner"><div class="movebox">⠿ Drag anywhere to move<button id="moveDone">Done</button></div></div>
    <div id="whatsnew">
      <div class="wn-head">
        <span class="wn-title">What's New</span>
        <span class="wn-ver" id="wnVer"></span>
        <span class="wn-x" id="wnX" title="Close">✕</span>
      </div>
      <ul id="wnList"></ul>
      <div class="wn-foot">
        <label class="wn-dismiss"><input type="checkbox" id="wnDontShow" checked /> Don't show this again</label>
        <button class="wn-close" id="wnCloseBtn">Got it</button>
      </div>
    </div>
    <div class="head">
      <div id="grip" title="Move overlay"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="5 9 2 12 5 15"/><polyline points="9 5 12 2 15 5"/><polyline points="15 19 12 22 9 19"/><polyline points="19 9 22 12 19 15"/><line x1="2" y1="12" x2="22" y2="12"/><line x1="12" y1="2" x2="12" y2="22"/></svg></div>
      <div id="cog" title="Overlay settings">⚙</div>
      <div id="cogMenu">
        <div class="cog-sec">Display</div>
        <label class="cog-opt"><input type="checkbox" id="tgCatbar" /> Show category filter bar</label>
        <label class="cog-opt"><input type="checkbox" id="tgOddsAdj" /> Show my real odds (only what I still need)</label>
        <label class="cog-opt"><input type="checkbox" id="tgTimeRel" /> Recent times as “2h ago”</label>
        <div class="cog-sec">OCR (opt-in)</div>
        <label class="cog-opt"><input type="checkbox" id="tgMissionOcr" /> Scan for tracked mission</label>
        <label class="cog-opt"><input type="checkbox" id="tgFabCapture" /> Contribute item images</label>
        <div class="cog-ocr" id="ocrStat"><span class="ocr-dot"></span><b>OCR idle</b></div>
        <div class="cog-sec">Tools</div>
        <button type="button" id="verify" class="cog-btn" title="Re-scan your game logs (including backups) for received blueprints">⟳ Verify from logs</button>
        <div class="cog-status" id="vstatus"></div>
        <button type="button" id="openSettings" class="cog-btn" title="Open the full settings window">⚙ Open full settings…</button>
      </div>
      <div class="eyebrow"><span class="dot" id="liveDot"></span> Active Mission<span id="liveTip">SubliminalsTV is <b>live</b>. Click if you want to hang out ↗</span></div>
      <div class="titlerow">
        <div class="title" id="title">No mission tracked</div>
        <div class="progress"><span class="frac" id="frac">0/0</span><div class="lbl">owned</div></div>
      </div>
      <div class="sub" id="sub"></div>
      <div id="missionPick">
        <button id="missionBtn" type="button"><span id="missionBtnLabel">No mission tracked</span><span class="caret">▾</span></button>
        <div id="missionMenu"></div>
      </div>
      <div id="completed"></div>
    </div>
    <div class="catbar" id="catbar"></div>
    <div class="pool" id="pool"></div>
    <div id="msg"></div>
    <div class="foot">
      <div class="foot-col-collected">
        <span class="fc-label">Total collected</span>
        <span class="fc-num" id="collected">0</span>
      </div>
      <div class="foot-col-ver">
        <span class="fv-app" id="appVer">Blueprint Tracker</span>
        <span class="fv-game" id="patch"></span>
      </div>
    </div>
    <div id="ocrToast"></div>
  </div>

<script>
  const $ = (id) => document.getElementById(id);
  let current = null;
  // "base" = odds out of the full pool; "adjusted" = your real odds counting only
  // the blueprints you still need (no duplicates), owned shown as —.
  let oddsMode = "base";
  // Active fabricator category filter (null = All). Set by the icon filter bar.
  let activeTab = null;
  // Whether the collapsed "Collected" (owned) group at the bottom of the pool is
  // expanded. Collapsed by default so the list leads with what you still need.
  let ownedOpen = false;
  // Whether the "Mission Info" drawer (faction/type/rep) is expanded. Open by default
  // (still collapsible via the header) so it's never hidden — most useful when the
  // mission has no pool or you've already collected everything. Forced open (static)
  // when there's no pool at all.
  let infoOpen = true;
  // Event-ladder tier expand/collapse overrides, keyed by tier pct. Default (no
  // entry): fully-collected tiers collapse, incomplete tiers stay open.
  const evOpen = {};

  // The 10 in-game fabricator filter tabs, in game order. Mirrors src/categories.ts
  // (the overlay is standalone HTML with no bundler; keep the two in sync). Icons are
  // the game's own filter glyphs, staged in overlay/icons/cat-*.svg.
  const TABS = [
    { key: "armor", label: "Armor", icon: "cat-armor.svg" },
    { key: "clothing", label: "Clothing", icon: "cat-clothing.svg" },
    { key: "weapons", label: "Weapons", icon: "cat-weapons.svg" },
    { key: "utility", label: "Utility", icon: "cat-utility.svg" },
    { key: "ammo", label: "Ammo", icon: "cat-ammo.svg" },
    { key: "vehicles", label: "Vehicles", icon: "cat-vehicles.svg" },
    { key: "sustenance", label: "Sustenance", icon: "cat-sustenance.svg" },
    { key: "container", label: "Container", icon: "cat-container.svg" },
    { key: "other", label: "Other", icon: "cat-other.svg" },
    { key: "missions", label: "Missions", icon: "cat-missions.svg" },
  ];

  // User prefs sent with the mission view (config-driven). Updated in render().
  // Defaults mirror the server so odds/verify start hidden (cleaner) with no first-paint flash.
  let PREFS = { timeRelative: true, hideCatbar: false, missionOcr: false };
  // Apply the category-bar visibility pref via a panel class (composes with the empty-state rule).
  function applyPrefs() {
    $("panel").classList.toggle("hide-catbar", !!PREFS.hideCatbar);
  }

  // Time label parts from an ISO stamp: absolute date+clock (the "date and timestamp")
  // plus a relative "2h ago" hint. The time-format setting picks which one to show.
  function fmtWhen(iso) {
    if (!iso) return null;
    const d = new Date(iso);
    if (isNaN(d.getTime())) return null;
    const clock = d.toLocaleTimeString([], { hour: "2-digit", minute: "2-digit" });
    const date = d.toLocaleDateString([], { month: "short", day: "numeric" });
    const min = Math.floor((Date.now() - d.getTime()) / 60000);
    let rel;
    if (min < 1) rel = "just now";
    else if (min < 60) rel = min + "m ago";
    else if (min < 1440) rel = Math.floor(min / 60) + "h ago";
    else rel = Math.floor(min / 1440) + "d ago";
    return { date: date + " " + clock, rel };
  }

  // Idle recent-activity block: last few completed missions + received blueprints.
  function recentActivityHtml(v) {
    const missions = v.recentMissions || [];
    const blueprints = v.recentBlueprints || [];
    if (!missions.length && !blueprints.length) return "";
    function whenCell(iso) {
      const w = fmtWhen(iso);
      if (!w) return '<span class="ra-when"></span>';
      // One or the other per the time-format setting: relative "2h ago" or absolute date+clock.
      const label = PREFS.timeRelative ? w.rel : w.date;
      return '<span class="ra-when"><span class="ra-date">' + label + "</span></span>";
    }
    let html = '<div class="recent">';
    if (missions.length) {
      html += '<div class="ra-sec"><div class="ra-h">Recent Missions</div><ul class="ra-list">';
      for (const m of missions) {
        const val = m.aUEC != null ? '<span class="ra-val">' + m.aUEC.toLocaleString() + " aUEC</span>" : "";
        html += '<li><span class="ra-glyph">◆</span><span class="ra-name">' + escapeHtml(m.title || "Mission") + "</span>" + val + whenCell(m.at) + "</li>";
      }
      html += "</ul></div>";
    }
    if (blueprints.length) {
      html += '<div class="ra-sec"><div class="ra-h">Recent Blueprints</div><ul class="ra-list">';
      for (const b of blueprints) {
        html += '<li><span class="ra-glyph">◆</span><span class="ra-name">' + escapeHtml(b.name) + "</span>" + whenCell(b.at) + "</li>";
      }
      html += "</ul></div>";
    }
    return html + "</div>";
  }

  function render(v) {
    current = v;
    if (v.prefs) { PREFS = v.prefs; applyPrefs(); }
    isLive = !!v.live; updateDiamond();
    const panel = $("panel");
    // Show the dataset version, and flag when the player's actual build isn't the one
    // we have data for (pools are an approximation from the same family).
    let patchTxt = v.patch || "";
    if (v.build && v.patch && !v.patch.includes(v.build)) patchTxt += " · build " + v.build + " (approx)";
    $("patch").textContent = patchTxt;
    $("appVer").textContent = "Blueprint Tracker" + (v.appVersion ? " v" + v.appVersion : "");
    $("collected").textContent = v.collectedTotal ?? 0;
    $("completed").innerHTML = v.completion ? completionCard(v.completion)
      : v.completed ? '<span class="completed">Mission complete</span>' : "";
    renderPicker(v);

    if (!v.contractKey) {
      $("title").textContent = "No mission tracked";
      $("sub").textContent = "";
      document.querySelector(".progress").style.display = "none";
      $("catbar").innerHTML = "";
      const recent = recentActivityHtml(v);
      if (recent) {
        // Idle state: show your last few completed missions + received blueprints.
        panel.classList.remove("empty");
        $("msg").innerHTML = "";
        $("pool").innerHTML = recent;
      } else {
        panel.classList.add("empty");
        $("pool").innerHTML = "";
        const hasList = v.missions && v.missions.length;
        $("msg").innerHTML = '<div class="msg">' +
          (hasList ? "Pick one from the dropdown above, or track a mission in-game." :
                     "Track a mission in-game to see its blueprint pool.") + "</div>";
      }
      return;
    }
    $("title").textContent = v.title || v.contractKey;
    $("sub").textContent = (v.generator || "").replace(/_/g, " ");

    const progress = document.querySelector(".progress");
    if (!v.hasPool || !v.pools.length) {
      // Dynamic-event mission (e.g. Return of XenoThreat): show the personal reward
      // ladder instead of "no reward" — what unlocks at each contribution %.
      if (v.eventTrack) { progress.style.display = ""; renderEventTrack(v.eventTrack); return; }
      // No blueprint pool: lead with the mission info we DO have (faction, type, rep) —
      // auto-expanded since there's nothing else on screen — plus any static payout
      // and/or ITEM rewards (Wikelo ships, armor, scrip). Bare message only if truly empty.
      const info = missionInfoHtml(v, true);
      const rew = rewardsHtml(v);
      if (info || rew) {
        panel.classList.remove("empty");
        $("msg").innerHTML = "";
        $("catbar").innerHTML = "";
        progress.style.display = "none"; // no blueprint progress to count
        $("pool").innerHTML = info + rew + '<div class="rewnote">This mission doesn’t drop blueprints.</div>';
        return;
      }
      panel.classList.add("empty");
      $("pool").innerHTML = "";
      $("msg").innerHTML = '<div class="msg"><b>No blueprint reward</b>This mission doesn’t drop blueprints.</div>';
      return;
    }
    panel.classList.remove("empty");
    progress.style.display = "";
    $("msg").innerHTML = "";
    $("frac").textContent = v.totals.owned + "/" + v.totals.total;

    // Flatten pool entries, computing each blueprint's display odds within ITS pool
    // (odds are per-pool), then regroup by fabricator category for display.
    const items = [];
    for (const pool of v.pools) {
      // Real odds of getting a specific blueprint = its weight / the pool's total,
      // not the raw per-entry chance (which is 1.0 for every entry → misleading 100%).
      const poolSum = pool.blueprints.reduce((a, b) => a + (b.chance || 0), 0) || 1;
      const missing = pool.blueprints.filter((x) => !x.owned).length;
      for (const b of pool.blueprints) {
        // base = weight / pool total; adjusted = 1 / what you still need (owned → —).
        const oddsP = oddsMode === "adjusted"
          ? (b.owned ? null : (missing > 0 ? 1 / missing : 0))
          : (b.chance || 0) / poolSum;
        items.push({ ...b, oddsP });
      }
    }

    // Per-tab counts drive the filter bar (computed before filtering so counts are stable).
    const counts = {};
    for (const it of items) {
      const c = counts[it.tab] || (counts[it.tab] = { total: 0, owned: 0 });
      c.total++; if (it.owned) c.owned++;
    }
    if (activeTab && !counts[activeTab]) activeTab = null; // selected tab not in this pool
    renderCatbar(counts);

    // Filter by the selected category tab (the icon bar at top). No in-line
    // category/sub-category headers — just the rows, grouped by tab order so a
    // filtered/unfiltered list stays visually tidy.
    const shown = activeTab ? items.filter((it) => it.tab === activeTab) : items;
    const ordered = TABS.flatMap((tab) => shown.filter((it) => it.tab === tab.key));

    // Lead with what you can still GET; everything owned tucks into a collapsed
    // "Collected" group at the bottom (click to expand — rows stay toggleable).
    // A pooled mission with a known payout / item rewards shows those up top.
    const need = ordered.filter((it) => !it.owned);
    const have = ordered.filter((it) => it.owned);
    // A labeled divider separates the GUARANTEED item rewards (no checkbox) above from the
    // collectible blueprint POOL (checkboxes) below — otherwise the two read as one list and
    // the reward rows look like pool items that are "missing" their checkmark.
    let html = missionInfoHtml(v) + rewardsHtml(v);
    if (v.ambiguous) html += '<div class="ambig">⚠ Multiple mission tiers share this name — showing all possible drops. Your actual mission draws from one tier, so odds are approximate.</div>';
    if (need.length || have.length) html += '<div class="poolhead">Blueprint pool<span class="ph-sub">1 random blueprint per completion</span></div>';
    html += need.map(rowHtml).join("");
    if (have.length) {
      html += '<div class="grphead" id="ownedHead" title="' + (ownedOpen ? "Hide" : "Show") + ' the blueprints you already own">' +
        '<span class="car">' + (ownedOpen ? "▾" : "▸") + "</span>Collected" +
        '<span class="gcnt">' + have.length + "/" + ordered.length + "</span></div>";
      if (ownedOpen) html += have.map(rowHtml).join("");
    }
    $("pool").innerHTML = html;
  }

  // One blueprint row (odds already computed into b.oddsP).
  function rowHtml(b) {
    const ovr = b.source === "manual" ? '<span class="ovr">[manual]</span>'
      : b.source === "default" ? '<span class="ovr def">[default]</span>' : "";
    const ch = b.oddsP == null
      ? '<span class="chance">—</span>'
      : '<span class="chance">' + (b.oddsP * 100 >= 10 ? Math.round(b.oddsP * 100) : (b.oddsP * 100).toFixed(1)) + "%</span>";
    return '<div class="row ' + (b.owned ? "owned" : "") + '" data-name="' + escapeAttr(b.name) + '" title="Click to toggle owned">' +
      '<span class="mark">' + (b.owned ? "✔" : "") + "</span>" +
      '<span class="name">' + escapeHtml(b.name) + ovr + "</span>" + ch +
    "</div>";
  }

  // Fabricator filter bar: all 10 tabs; tabs with no blueprint in the current pool
  // are greyed (non-clickable), the selected tab is highlighted, and a count badge
  // shows how many blueprints each tab holds.
  function renderCatbar(counts) {
    $("catbar").innerHTML = TABS.map((t) => {
      const c = counts[t.key];
      const cls = "cat" + (c ? "" : " off") + (activeTab === t.key ? " active" : "");
      const title = t.label + (c ? " · " + c.owned + "/" + c.total + " owned" : " · none in this pool");
      const cnt = c ? '<span class="cnt">' + c.total + "</span>" : "";
      return '<div class="' + cls + '" data-tab="' + t.key + '" title="' + escapeAttr(title) +
        '" style="--u:url(\'icons/' + t.icon + '\')"><span class="ci"></span>' + cnt + "</div>";
    }).join("");
  }

  // Dynamic-event reward ladder (Return of XenoThreat): shown on an event mission that
  // has no blueprint pool. A note + each contribution-% tier with its rewards and owned
  // checks. Rows carry data-name so the existing click-to-toggle handler works.
  function renderEventTrack(track) {
    $("panel").classList.remove("empty");
    $("catbar").innerHTML = "";
    $("msg").innerHTML = "";
    const all = track.tiers.flatMap((t) => t.items);
    $("frac").textContent = all.filter((i) => i.owned).length + "/" + all.length;

    const html = [
      '<div class="evhead"><span class="dot"></span>' + escapeHtml(track.name) + " · Reward Track</div>",
      '<div class="evnote">' + escapeHtml(track.note) + "</div>",
    ];
    for (const tier of track.tiers) {
      const tOwned = tier.items.filter((i) => i.owned).length;
      const done = tOwned === tier.items.length;
      // Collapsed tiers hide their rows: completed tiers tuck away by default so the
      // ladder leads with what's still missing; click a tier header to toggle.
      const open = tier.pct in evOpen ? evOpen[tier.pct] : !done;
      html.push('<div class="evtier' + (done ? " done" : "") + '" data-pct="' + tier.pct + '" data-open="' + (open ? 1 : 0) +
        '" title="' + (open ? "Collapse" : "Expand") + ' this tier">' +
        '<span class="evcar">' + (open ? "▾" : "▸") + '</span>' +
        '<span class="evpct">' + tier.pct + '%</span><span class="evbar"></span>' +
        '<span class="evcount">' + tOwned + "/" + tier.items.length + "</span></div>");
      if (!open) continue;
      for (const it of tier.items) {
        const ovr = it.source === "manual" ? '<span class="ovr">[manual]</span>' : "";
        html.push(
          '<div class="row ' + (it.owned ? "owned" : "") + '" data-name="' + escapeAttr(it.name) + '" title="Click to toggle owned">' +
            '<span class="mark">' + (it.owned ? "✔" : "") + "</span>" +
            '<span class="name">' + escapeHtml(it.name) + ovr + "</span>" +
          "</div>"
        );
      }
    }
    $("pool").innerHTML = html.join("");
  }

  function escapeHtml(s){return s.replace(/[&<>]/g,c=>({"&":"&amp;","<":"&lt;",">":"&gt;"}[c]));}
  function escapeAttr(s){return s.replace(/"/g,"&quot;");}

  // Static payout as display text, or null. Most missions are runtime-calculated
  // (no static amount in the game data) — those stay silent rather than guessing.
  // min 0/null = "up to max"; MER = prison merits.
  function payoutText(p) {
    if (!p || !p.max) return null;
    const cur = (p.currency || "").toUpperCase() === "MER" ? "merits" : "aUEC";
    const n = (x) => Number(x).toLocaleString();
    if (p.min && p.min !== p.max) return n(p.min) + "–" + n(p.max) + " " + cur;
    if (!p.min) return "up to " + n(p.max) + " " + cur;
    return n(p.max) + " " + cur;
  }

  // Collapsible "Mission Info" drawer: faction/giver, mission type, and reputation
  // gained/lost. Collapsed by default on a pooled mission (tap to expand); forced
  // open when the mission has no pool (forceOpen) so the panel isn't bare. Returns ""
  // when there's nothing to show. Payout is deliberately NOT here — it's only known
  // for sure after completion, shown by the mission-complete card.
  function repRows(list, neg) {
    return list.map((r) => {
      const amt = (neg ? "−" : "+") + Number(r.amount || 0).toLocaleString();
      return '<div class="mi-rep"><span class="mi-fac">' + escapeHtml(r.faction || "—") + "</span>" +
        '<span class="mi-amt ' + (neg ? "neg" : "pos") + '">' + amt + " rep</span></div>";
    }).join("");
  }
  // Reputation progress bar for the tracked mission's giver: current standing NAME + a
  // fill toward the next rank. A LOWER-BOUND estimate (server-side rep is never logged),
  // so the readout is qualified "est." and the caption uses "~".
  function repBarHtml(rb) {
    const num = (x) => Number(x || 0).toLocaleString();
    let pct, cap, empty = false;
    if (rb.noData) {
      // No completions summed for this giver yet — don't fake a standing, prompt a verify.
      pct = 0; empty = true;
      cap = "no completions tracked yet · run Verify from logs";
    } else if (rb.max) {
      pct = 100;
      cap = "Top standing reached";
    } else {
      const span = (rb.nextMin - rb.curMin) || 1;
      pct = Math.max(0, Math.min(100, ((rb.estimate - rb.curMin) / span) * 100));
      cap = "~" + num(rb.estimate) + " / " + num(rb.nextMin) +
        ' <span class="nx">→ ' + escapeHtml(rb.nextName || "") + "</span>";
    }
    const standing = rb.noData ? "—" : escapeHtml(rb.standing);
    return '<div class="mi-row" title="Estimated standing with ' + escapeAttr(rb.faction) +
      ". Your exact rep isn't in the game log, so this is a lower bound summed from missions you've completed since the 4.8 wipe.\">" +
      '<span class="mi-k">Standing</span><span class="mi-v">' + standing +
      ' <span class="mi-hint">' + (rb.noData ? "no data" : "est.") + '</span></span></div>' +
      '<div class="rb' + (empty ? " floor" : "") + '"><div class="rb-track"><div class="rb-fill" style="width:' +
      pct.toFixed(1) + '%"></div></div><div class="rb-cap">' + cap + "</div></div>";
  }
  function missionInfoHtml(v, forceOpen) {
    const giver = v.giver, type = v.missionType;
    const rg = v.reputationGained || [], rl = v.reputationLost || [];
    if (!giver && !type && !rg.length && !rl.length) return "";
    const open = !!forceOpen || infoOpen;
    let body = "";
    if (open) {
      const rows = [];
      if (giver) rows.push('<div class="mi-row"><span class="mi-k">Faction</span><span class="mi-v">' + escapeHtml(giver) + "</span></div>");
      // Reputation progress: current standing NAME + a bar toward the next rank when we
      // have the giver's ladder (repBar). Falls back to the bare inferred-rank number for
      // givers with no rankable rep scope. Both are lower bounds — rep is server-side.
      if (v.repBar) {
        rows.push(repBarHtml(v.repBar));
      } else if (v.inferredRank != null) {
        rows.push('<div class="mi-row" title="Lowest rank you must be — the game only offers this giver&#39;s rank-' +
          v.inferredRank + ' missions at that standing. Your exact rep isn&#39;t in the game log.">' +
          '<span class="mi-k">Your rank</span><span class="mi-v">' + v.inferredRank +
          '+ <span class="mi-hint">inferred</span></span></div>');
      }
      if (type) rows.push('<div class="mi-row"><span class="mi-k">Type</span><span class="mi-v">' + escapeHtml(type) + "</span></div>");
      if (rg.length) rows.push('<div class="mi-sec">Reputation gained</div>' + repRows(rg, false));
      if (rl.length) rows.push('<div class="mi-sec">Reputation lost</div>' + repRows(rl, true));
      body = '<div class="mi-body">' + rows.join("") + "</div>";
    }
    const car = forceOpen ? "" : '<span class="car">' + (open ? "▾" : "▸") + "</span>";
    const title = forceOpen ? "" : ' title="' + (open ? "Hide" : "Show") + ' mission details"';
    return '<div class="mi"><div class="mi-head' + (forceOpen ? " static" : "") + '" id="miHead"' + title + ">" +
      car + "Mission Info</div>" + body + "</div>";
  }

  // Payout line + ITEM rewards (actual items — not blueprints; display-only).
  function rewardsHtml(v) {
    const parts = [];
    const pay = payoutText(v.payout);
    if (pay) parts.push('<div class="rewpay"><span class="rp-lbl">Payout</span><span class="rp-val">' + escapeHtml(pay) + "</span></div>");
    const items = v.itemRewards || [];
    if (items.length) {
      // Same divider + row treatment as the blueprint pool — these are things you
      // acquire too, so they get a tick box. Ticking is MANUAL and local-only: the log
      // never reports item awards, and these never touch the blueprint count or sync.
      parts.push('<div class="poolhead">Guaranteed rewards<span class="ph-sub">always awarded</span></div>');
      for (const it of items) {
        parts.push('<div class="row ' + (it.owned ? "owned" : "") + '" data-item="' + escapeAttr(it.name) + '" title="Click to tick off (manual)">' +
          '<span class="mark">' + (it.owned ? "✔" : "") + "</span>" +
          '<span class="name">' + escapeHtml(it.name) + "</span>" +
          (it.amount > 1 ? '<span class="chance">×' + it.amount + "</span>" : "") +
          "</div>");
      }
    }
    return parts.length ? '<div class="rew">' + parts.join("") + "</div>" : "";
  }

  // Mission-complete summary card: payout, time taken, blueprints received. Shown
  // for ~30s over the completed mission, then the overlay moves to the next one.
  function fmtDur(ms){ if(ms==null) return null; const s=Math.max(0,Math.round(ms/1000)); const m=Math.floor(s/60); return m+":"+String(s%60).padStart(2,"0"); }
  function completionCard(c){
    if (c.kind === "abandoned") {
      return '<div class="cc abn"><div class="cc-head"><span class="cc-check abn">✕</span> Mission Abandoned</div></div>';
    }
    const stats = [];
    if (c.aUEC != null) stats.push('<div class="cc-stat"><span class="cc-val">+' + c.aUEC.toLocaleString() + '</span><span class="cc-lbl">aUEC</span></div>');
    const dur = fmtDur(c.durationMs);
    if (dur) stats.push('<div class="cc-stat"><span class="cc-val">' + dur + '</span><span class="cc-lbl">time</span></div>');
    const bps = c.blueprints || [];
    if (bps.length) stats.push('<div class="cc-stat"><span class="cc-val">+' + bps.length + '</span><span class="cc-lbl">blueprint' + (bps.length>1?"s":"") + '</span></div>');
    // Adaptive grid: 1 drop → full-width hero; 2/3 → that many columns; 4+ → 4 columns, wraps.
    const cols = Math.min(bps.length, 4);
    const bpsCls = "cc-bps" + (bps.length === 1 ? " single" : "");
    const bpsHtml = bps.length
      ? '<div class="' + bpsCls + '" style="--cols:' + cols + '">' + bps.map(bpTile).join("") + '</div>'
      : "";
    return '<div class="cc"><div class="cc-head"><span class="cc-check">✓</span> Mission Complete</div>' +
      (stats.length ? '<div class="cc-stats">' + stats.join("") + '</div>' : "") +
      bpsHtml + '</div>';
  }
  // One unlocked-blueprint tile: the item render (falls back to a glyph) + its name.
  function bpTile(b){
    const thumb = b.image
      ? '<span class="cc-bp-thumb"><img src="' + b.image + '" alt="" onerror="this.remove();this.parentElement.classList.add(\'noimg\')"></span>'
      : '<span class="cc-bp-thumb noimg"></span>';
    return '<div class="cc-bp">' + thumb + '<span class="cc-bp-name">' + escapeHtml(b.name || "Blueprint") + '</span></div>';
  }

  // Mission picker: the log can't tell us which mission you've *selected* to track,
  // so list every accepted mission and let you choose. Auto = newest with a pool.
  function renderPicker(v) {
    const pick = $("missionPick");
    const list = v.missions || [];
    if (list.length < 1) { pick.style.display = "none"; return; }
    pick.style.display = "block";
    $("missionBtnLabel").textContent = v.selectedId
      ? (list.find((m) => m.id === v.selectedId)?.title || v.title || "Mission")
      : ("Auto: " + (v.title || "none"));
    // Disambiguate duplicate mission titles with a (1)/(2) suffix.
    const counts = {}; list.forEach((m) => (counts[m.title] = (counts[m.title] || 0) + 1));
    const seen = {};
    const rows = ['<div class="opt' + (v.selectedId ? "" : " active") + '" data-id="">Auto — newest with blueprints</div>'];
    for (const m of list) {
      let label = (m.hasPool ? "◆ " : "○ ") + m.title;
      if (counts[m.title] > 1) { seen[m.title] = (seen[m.title] || 0) + 1; label += " (" + seen[m.title] + ")"; }
      rows.push('<div class="opt' + (v.selectedId === m.id ? " active" : "") + '" data-id="' + escapeAttr(m.id) + '">' + escapeHtml(label) + "</div>");
    }
    $("missionMenu").innerHTML = rows.join("");
  }
  $("missionBtn").addEventListener("click", (e) => {
    e.stopPropagation();
    $("missionMenu").classList.toggle("open");
  });
  $("missionMenu").addEventListener("click", (e) => {
    const opt = e.target.closest(".opt");
    if (!opt) return;
    fetch("/api/missions/select", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ missionId: opt.getAttribute("data-id") }),
    });
    $("missionMenu").classList.remove("open");
  });
  document.addEventListener("click", () => $("missionMenu").classList.remove("open"));

  function setOwned(name, owned) {
    fetch("/api/missions/own", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, owned }),
    });
  }

  // Guaranteed ITEM rewards — manual, local-only tick (never counted/synced).
  function setGuaranteedOwned(name, owned) {
    fetch("/api/missions/own-item", {
      method: "POST", headers: { "Content-Type": "application/json" },
      body: JSON.stringify({ name, owned }),
    });
  }

  // Click a blueprint to manually toggle owned (seeds pre-existing inventory).
  // Marking owned is one click; UN-marking asks first, so an accidental click while
  // looking at an item can't silently wipe a blueprint you actually own.
  $("pool").addEventListener("click", (e) => {
    // The "Mission Info" drawer header toggles its details. Only collapsible on a
    // pooled mission — pool-less missions force it open, so a click there is a no-op.
    if (e.target.closest("#miHead")) {
      if (current && current.hasPool) { infoOpen = !infoOpen; render(current); }
      return;
    }
    // The "Collected" group header toggles the owned rows open/closed.
    if (e.target.closest("#ownedHead")) {
      ownedOpen = !ownedOpen;
      if (current) render(current);
      return;
    }
    // An event-ladder tier header toggles that tier's reward rows.
    const tierEl = e.target.closest(".evtier");
    if (tierEl) {
      evOpen[tierEl.getAttribute("data-pct")] = tierEl.getAttribute("data-open") !== "1";
      if (current) render(current);
      return;
    }
    // Guaranteed ITEM reward rows tick off in one click. Manual-only + low stakes, so
    // no un-tick confirm (blueprints get one because they guard real collection data).
    const itemRow = e.target.closest(".row[data-item]");
    if (itemRow) {
      setGuaranteedOwned(itemRow.getAttribute("data-item"), !itemRow.classList.contains("owned"));
      return;
    }

    const row = e.target.closest(".row");
    if (!row || !current) return;
    const name = row.getAttribute("data-name");

    if (e.target.classList.contains("cf-yes")) { setOwned(name, false); return; }
    if (e.target.classList.contains("cf-no")) {
      row.classList.remove("confirming");
      const c = row.querySelector(".confirm"); if (c) c.remove();
      return;
    }
    if (row.classList.contains("confirming")) return; // wait for a confirm choice

    if (!row.classList.contains("owned")) { setOwned(name, true); return; } // owning: no prompt

    // Un-owning: confirm first.
    row.classList.add("confirming");
    const el = document.createElement("div");
    el.className = "confirm";
    el.innerHTML = '<span class="cf-q">Mark not owned?</span>' +
      '<button class="cf-no">Keep</button><button class="cf-yes">Remove</button>';
    row.appendChild(el);
  });

  // Re-scan every game log (current + backups) for received blueprints.
  $("verify").addEventListener("click", async () => {
    const btn = $("verify");
    const label = btn.textContent;
    btn.disabled = true; btn.textContent = "Verifying…"; $("vstatus").textContent = "";
    try {
      const r = await (await fetch("/api/missions/verify", { method: "POST" })).json();
      $("vstatus").textContent = r.ok
        ? "scanned " + r.files + " live logs · +" + r.added + " new"
          + (r.restored ? " · " + r.restored + " restored" : "")
          + (r.skipped ? " · " + r.skipped + " PTU skipped" : "")
        : "verify failed";
    } catch {
      $("vstatus").textContent = "verify failed";
    } finally {
      btn.disabled = false; btn.textContent = label;
    }
  });

  // Electron overlay: report hover so the shell makes the HUD clickable only while
  // the pointer is over it (clicks pass to the game everywhere else). No-op in OBS.
  if (window.overlayApi) {
    const panel = $("panel");
    panel.classList.add("electron"); // reveals the grab handle (OBS mode has no window to move)
    let leaveT;
    panel.addEventListener("mouseenter", () => { clearTimeout(leaveT); window.overlayApi.hover(true); });
    panel.addEventListener("mouseleave", () => { leaveT = setTimeout(() => window.overlayApi.hover(false), 150); });
    // Move mode (grab handle / tray "Move overlay…" / Ctrl+Alt+M): show the drag banner.
    window.overlayApi.onMoveMode?.((on) => panel.classList.toggle("moving", on));
    $("grip").addEventListener("click", () => window.overlayApi.beginMove?.());
    $("moveDone").addEventListener("click", () => window.overlayApi.endMove());

    // "What's new" card — show once per new version. Hover-interactive (like the panel)
    // and flagged as a modal so it stays clickable to close even when the HUD is locked.
    (async () => {
      try {
        const version = await window.overlayApi.getVersion?.();
        if (!version) return;
        const data = await (await fetch("/api/changelog?v=" + encodeURIComponent(version))).json();
        if (data.seen || !Array.isArray(data.notes) || !data.notes.length) return;
        const card = $("whatsnew");
        $("wnVer").textContent = "v" + version;
        $("wnList").innerHTML = data.notes.map((n) => "<li>" + escapeHtml(n) + "</li>").join("");
        card.classList.add("show");
        window.overlayApi.setModal?.(true);
        let wnLeaveT;
        card.addEventListener("mouseenter", () => { clearTimeout(wnLeaveT); window.overlayApi.hover(true); });
        card.addEventListener("mouseleave", () => { wnLeaveT = setTimeout(() => window.overlayApi.hover(false), 150); });
        const close = async () => {
          if ($("wnDontShow").checked) {
            try { await fetch("/api/changelog-seen?v=" + encodeURIComponent(version), { method: "POST" }); } catch { /* best-effort */ }
          }
          card.classList.remove("show");
          window.overlayApi.setModal?.(false);
          window.overlayApi.hover(false);
        };
        $("wnX").addEventListener("click", close);
        $("wnCloseBtn").addEventListener("click", close);
      } catch { /* changelog is best-effort */ }
    })();
  }

  // Filter bar: click a lit tab to filter the pool to that category; click it again
  // (or its highlighted state) to clear back to All. Greyed tabs are inert.
  $("catbar").addEventListener("click", (e) => {
    const cat = e.target.closest(".cat");
    if (!cat || cat.classList.contains("off")) return;
    const tab = cat.getAttribute("data-tab");
    activeTab = activeTab === tab ? null : tab;
    if (current) render(current);
  });

  // ── Settings cog: pool display, Verify, OCR ───────────────────────────────
  function setCog(open) {
    $("cogMenu").classList.toggle("open", open);
    $("cog").classList.toggle("open", open);
    if (open) {
      $("tgCatbar").checked = !PREFS.hideCatbar;
      $("tgOddsAdj").checked = oddsMode === "adjusted";
      $("tgTimeRel").checked = PREFS.timeRelative !== false;
      $("tgMissionOcr").checked = !!PREFS.missionOcr;
      $("tgFabCapture").checked = !!PREFS.fabCapture;
      updateOcr();
      window.overlayApi?.setModal?.(true);
      window.overlayApi?.hover?.(true);
    } else {
      window.overlayApi?.setModal?.(false);
    }
  }
  $("cog").addEventListener("click", (e) => { e.stopPropagation(); setCog(!$("cogMenu").classList.contains("open")); });
  $("cogMenu").addEventListener("click", (e) => e.stopPropagation());
  document.addEventListener("click", () => { if ($("cogMenu").classList.contains("open")) setCog(false); });
  // A persisted display pref: apply locally now, save it (broadcasts to OBS too).
  function setPref(patch) {
    Object.assign(PREFS, patch);
    applyPrefs();
    fetch("/api/config", { method: "POST", headers: { "Content-Type": "application/json" }, body: JSON.stringify(patch) })
      .catch(() => { /* best-effort; the local apply already took effect */ });
  }
  $("tgCatbar").addEventListener("change", () => setPref({ hideCatbar: !$("tgCatbar").checked }));
  // Odds mode: base (out of the full pool) vs adjusted (only what you still need). Session-local.
  $("tgOddsAdj").addEventListener("change", () => {
    oddsMode = $("tgOddsAdj").checked ? "adjusted" : "base";
    if (current) render(current);
  });
  // Recent-activity time format (moved here from the settings window). Persisted + re-rendered.
  $("tgTimeRel").addEventListener("change", () => { setPref({ timeRelative: $("tgTimeRel").checked }); if (current) render(current); });
  // Mission-name OCR on/off — read by the capture loop each poll (not a display pref).
  $("tgMissionOcr").addEventListener("change", () => { setPref({ missionOcr: $("tgMissionOcr").checked }); updateOcr(); });
  $("tgFabCapture").addEventListener("change", () => { setPref({ fabCapture: $("tgFabCapture").checked }); updateOcr(); });
  $("openSettings").addEventListener("click", (e) => { e.stopPropagation(); window.overlayApi?.openSettings?.(); setCog(false); });

  // OCR activity (fabricator image capture + tracked-mission read). Fed by the Electron
  // shell over IPC; a no-op in OBS browser-source mode (no overlayApi).
  let OCR = { state: "", lastMission: "", lastCapture: "" };
  let inFab = false;   // a fabricator kiosk is on screen (OCR context) -> gold diamond
  let isLive = false;  // SubliminalsTV is live on Twitch (from the view) -> purple diamond
  let ocrToastT;
  function showOcrToast(text) {
    const el = $("ocrToast");
    el.textContent = text; el.classList.add("show");
    clearTimeout(ocrToastT); ocrToastT = setTimeout(() => el.classList.remove("show"), 4200);
  }
  function updateOcr() {
    const el = $("ocrStat");
    const active = OCR.state === "watching" || OCR.state === "fabricator";
    el.classList.toggle("on", active);
    let head;
    if (OCR.state === "fabricator") head = "Reading the fabricator…";
    else if (OCR.state === "idle") head = "Waiting for Star Citizen…";
    else if (active) head = "Watching Star Citizen…";
    else head = "OCR off — turn on scanning above";
    let html = '<span class="ocr-dot"></span><b>' + head + "</b>";
    if (OCR.lastMission) html += "<br>Mission read: " + escapeHtml(OCR.lastMission);
    if (OCR.lastCapture) html += "<br>Last image: " + escapeHtml(OCR.lastCapture);
    el.innerHTML = html;
  }
  // Diamond glyph colour: gold in the fabricator, purple when SubliminalsTV is live, else cyan.
  // Fabricator wins (it's a momentary crafting cue); the live click/tooltip stay active whenever live.
  function updateDiamond() {
    const d = $("liveDot");
    d.classList.toggle("fab", inFab);
    d.classList.toggle("live", isLive && !inFab);
    d.classList.toggle("clickable", isLive);
    if (!isLive) $("liveTip").classList.remove("show");
  }
  function onOcrEvent(s) {
    if (!s || !s.state) return;
    if (s.state === "mission") {
      if (s.title) { OCR.lastMission = s.title; showOcrToast("🎯 " + s.title); }
    } else if (s.state === "captured") {
      if (s.name) { OCR.lastCapture = s.name; showOcrToast("📸 " + s.name + (s.uploaded ? " · shared" : " · saved")); }
    } else if (s.state === "settling") {
      /* discrete event; leaves the on-screen context as-is */
    } else {
      OCR.state = s.state;                 // context: off / idle / watching / fabricator
      inFab = s.state === "fabricator";
      updateDiamond();
    }
    updateOcr();
  }
  window.overlayApi?.onOcr?.(onOcrEvent);
  // Live-on-Twitch diamond: hover invite + click through to the stream.
  $("liveDot").addEventListener("mouseenter", () => { if (isLive) $("liveTip").classList.add("show"); });
  $("liveDot").addEventListener("mouseleave", () => $("liveTip").classList.remove("show"));
  $("liveDot").addEventListener("click", (e) => {
    if (!isLive) return;
    e.stopPropagation();
    const url = "https://twitch.tv/subliminalstv";
    if (window.overlayApi?.openUrl) window.overlayApi.openUrl(url);
    else window.open(url, "_blank");
  });

  applyPrefs();

  // Live updates.
  const es = new EventSource("/missions/events");
  es.onmessage = (e) => { try { render(JSON.parse(e.data)); } catch {} };
  es.onerror = () => { /* auto-reconnects */ };
</script>
</body>
</html>
