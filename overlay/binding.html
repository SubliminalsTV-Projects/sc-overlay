<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Binding Chart Overlay</title>
<style>
  html, body { margin: 0; height: 100%; background: transparent; overflow: hidden; }
  /* The PNG (with its own transparency) shown fit-to-screen, centered. */
  #chart {
    position: fixed; inset: 0; width: 100%; height: 100%;
    object-fit: contain; object-position: center;
    -webkit-user-select: none; user-select: none; pointer-events: none;
  }
  #chart:not([src]) , #chart[data-empty] { display: none; }
</style>
</head>
<body>
  <img id="chart" alt="" />
  <script>
    // Reload the image each time the overlay is shown so swapping the PNG in settings
    // takes effect without restarting. main.cjs pings us via the page URL hash on toggle.
    const img = document.getElementById("chart");
    function refresh() { img.src = "/api/binding-image?t=" + Date.now(); }
    img.addEventListener("error", () => { img.removeAttribute("src"); });
    window.addEventListener("hashchange", refresh); // main.cjs bumps the hash on show
    refresh();
  </script>
</body>
</html>
